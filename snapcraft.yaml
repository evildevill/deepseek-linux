name: deepseek-linux
base: core24
version: '1.0.0'
summary: Unofficial DeepSeek Desktop Client
description: |
  A simple and efficient desktop client for DeepSeek, using Electron to provide a seamless experience.

grade: stable
confinement: strict

apps:
  deepseek-linux:
    command: deepseek-linux
    extensions: [gnome-3-38]
    plugs:
      - network
      - network-bind
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl

parts:
  deepseek-linux:
    plugin: dump
    source: .
    stage-packages:
      - libnss3
      - libxss1
      - libgtk-3-0
    after:
      - desktop-gtk3
